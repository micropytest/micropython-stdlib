target-version = "py38"
line-length = 99
indent-width = 2
extend-include = []
extend-exclude = []

[format]
indent-style = "space"
docstring-code-format = true
docstring-code-line-length = 99
quote-style = "double"

[lint]
extend-select = [
  "C9",
  "PLC",
]
extend-ignore = [
  "E402",
  "E722",
  "E731",
  "E741",
  "F401",
  "F403",
  "F405",
  "PLC0206",
  "PLC0415",
]

exclude = [
  "*/manifest.py",
]

[lint.flake8-quotes]
docstring-quotes = "double"